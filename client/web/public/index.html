<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Romantic Oracle Raven</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
        background-color: #f0f0f0;
      }
      .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        max-width: 500px;
        margin: 0 auto;
      }
      h1 {
        color: #333;
      }
      p {
        color: #666;
      }
      .status {
        font-weight: bold;
        color: green;
        margin: 20px 0;
      }
      .info {
        background-color: #e8f4f8;
        padding: 15px;
        border-radius: 5px;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>❤️ DatingMatcher 测试页面</h1>
      <div class="status">✅ 应用服务运行正常</div>
      <p>这是一个测试页面，用于验证Nginx配置和基本服务是否正常工作。</p>
      <div class="info">
        <h3>服务信息</h3>
        <p><strong>前端地址：</strong> <a href="http://localhost">http://localhost</a></p>
        <p><strong>API地址：</strong> <a href="http://localhost:5000/api">http://localhost:5000/api</a></p>
        <p><strong>数据库：</strong> MongoDB (端口 27017)</p>
      </div>
      <div class="info">
        <h3>可用页面</h3>
        <p><a href="http://localhost/auth">登录/注册页面</a></p>
        <p><a href="http://localhost">首页 (需要登录)</a></p>
        <p><a href="http://localhost/questions">问题页面 (需要登录)</a></p>
        <p><a href="http://localhost/matches">匹配页面 (需要登录)</a></p>
        <p><a href="http://localhost/scenarios">场景页面 (需要登录)</a></p>
      </div>
      <p>如果您看到此页面，说明Nginx服务和基本配置正常工作。</p>
    </div>
  </body>
</html>
