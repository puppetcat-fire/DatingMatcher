version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: datingmatcher-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=datingmatcher
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: datingmatcher-backend
    ports:
      - "5000:5000"
    env_file:
      - server/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/datingmatcher
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: datingmatcher-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data: